<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股週線選股系統</title>
<style>
  :root {
    --bg: #0d0f14;
    --bg2: #141720;
    --bg3: #1c2030;
    --bg4: #242840;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #e8eaf0;
    --text2: #8890a8;
    --text3: #555e78;
    --accent: #4f9cf9;
    --accent2: #2d7ce0;
    --green: #34d399;
    --green2: #059669;
    --red: #f87171;
    --amber: #fbbf24;
    --teal: #2dd4bf;
    --font: 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 2px; }

  .app { display: grid; grid-template-rows: 56px 1fr; height: 100vh; }

  header {
    border-bottom: 1px solid var(--border); display: flex;
    align-items: center; padding: 0 24px; gap: 12px; background: var(--bg2);
  }
  .logo { font-size: 16px; font-weight: 700; }
  .logo span { color: var(--accent); }
  .hbadge {
    font-size: 11px; padding: 3px 8px; border-radius: 4px;
    background: rgba(79,156,249,0.12); color: var(--accent); border: 1px solid rgba(79,156,249,0.2);
  }
  .spacer { flex: 1; }
  .update-time { font-size: 12px; color: var(--text3); }
  .refresh-btn {
    font-size: 12px; padding: 5px 12px; border-radius: 5px;
    border: 1px solid var(--border2); background: none; color: var(--text2); cursor: pointer;
  }
  .refresh-btn:hover { color: var(--accent); border-color: var(--accent); }

  .main { display: grid; grid-template-columns: 280px 1fr; overflow: hidden; }

  /* SIDEBAR */
  .sidebar {
    border-right: 1px solid var(--border); overflow-y: auto;
    background: var(--bg2); padding: 18px 14px; display: flex; flex-direction: column; gap: 18px;
  }
  .sec-label {
    font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--text3); margin-bottom: 8px;
  }
  .card { background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 13px; }
  .card-head { display: flex; align-items: center; gap: 7px; margin-bottom: 11px; }
  .card-title { font-size: 13px; font-weight: 600; flex: 1; }
  .pill { font-size: 10px; padding: 2px 7px; border-radius: 20px; font-weight: 600; }
  .pill-g { background: rgba(52,211,153,0.15); color: var(--green); }
  .pill-a { background: rgba(251,191,36,0.15); color: var(--amber); }

  .param { margin-bottom: 9px; }
  .prow { display: flex; justify-content: space-between; margin-bottom: 3px; }
  .plabel { font-size: 12px; color: var(--text2); }
  .pval { font-size: 12px; font-weight: 600; color: var(--accent); }
  input[type=range] {
    width: 100%; height: 3px; appearance: none; background: var(--bg4);
    border-radius: 2px; outline: none; cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    appearance: none; width: 13px; height: 13px;
    border-radius: 50%; background: var(--accent); cursor: pointer;
  }

  /* Filter chips */
  .filter-group { display: flex; flex-wrap: wrap; gap: 5px; }
  .fchip {
    font-size: 12px; padding: 4px 10px; border-radius: 20px; cursor: pointer;
    border: 1px solid var(--border2); background: none; color: var(--text2);
    transition: all 0.15s; font-family: var(--font);
  }
  .fchip.active { background: var(--bg4); color: var(--text); border-color: var(--accent); }

  .apply-btn {
    width: 100%; padding: 10px; border-radius: 8px; border: none;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    color: white; font-size: 14px; font-weight: 700; cursor: pointer; font-family: var(--font);
  }
  .apply-btn:hover { opacity: 0.9; }

  /* CONTENT */
  .content { overflow-y: auto; padding: 20px 22px; }

  .metrics-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 18px; }
  .metric { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 13px 15px; }
  .metric-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
  .metric-val { font-size: 22px; font-weight: 700; line-height: 1; }
  .metric-sub { font-size: 11px; color: var(--text3); margin-top: 3px; }

  /* Search bar */
  .toolbar { display: flex; gap: 8px; margin-bottom: 14px; align-items: center; }
  .search-box {
    flex: 1; background: var(--bg2); border: 1px solid var(--border2);
    color: var(--text); border-radius: 7px; padding: 7px 12px; font-size: 13px;
    outline: none; font-family: var(--font);
  }
  .search-box:focus { border-color: var(--accent); }
  .sort-btn {
    font-size: 12px; padding: 7px 12px; border-radius: 6px; border: 1px solid var(--border2);
    background: none; color: var(--text2); cursor: pointer; font-family: var(--font);
  }
  .sort-btn.active { color: var(--accent); border-color: var(--accent); }

  /* TABLE */
  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left; padding: 7px 11px; font-size: 11px; font-weight: 600;
    color: var(--text3); letter-spacing: 0.05em; text-transform: uppercase;
    border-bottom: 1px solid var(--border); white-space: nowrap; cursor: pointer;
  }
  th:hover { color: var(--text2); }
  td { padding: 10px 11px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }

  .sc { font-weight: 700; font-size: 13px; }
  .sn { font-size: 12px; color: var(--text2); margin-top: 1px; }
  .ind-tag {
    font-size: 11px; padding: 2px 7px; border-radius: 4px;
    background: rgba(45,212,191,0.1); color: var(--teal); border: 1px solid rgba(45,212,191,0.18);
  }
  .mkt-tag {
    font-size: 10px; padding: 1px 5px; border-radius: 3px; margin-left: 4px;
    background: rgba(79,156,249,0.1); color: var(--accent);
  }
  .chg-pos { color: var(--green); font-weight: 600; }
  .chg-neg { color: var(--red); font-weight: 600; }
  .bar-checks { display: flex; gap: 3px; }
  .chk { width: 7px; height: 7px; border-radius: 2px; }
  .chk-ok { background: var(--green2); }
  .chk-no { background: var(--bg4); }
  .score-cell { display: flex; align-items: center; gap: 7px; }
  .score-track { flex: 1; height: 4px; background: var(--bg4); border-radius: 2px; overflow: hidden; min-width: 50px; }
  .score-fill { height: 100%; border-radius: 2px; }
  .score-num { font-size: 13px; font-weight: 700; min-width: 24px; }
  .detail-btn {
    font-size: 12px; padding: 4px 9px; border-radius: 5px; border: 1px solid var(--border2);
    background: none; color: var(--text2); cursor: pointer; font-family: var(--font);
  }
  .detail-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* STATES */
  .loading-state { text-align: center; padding: 60px 20px; color: var(--text3); }
  .loading-icon { font-size: 40px; margin-bottom: 12px; animation: spin 2s linear infinite; display: inline-block; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text3); }
  .empty-icon { font-size: 40px; margin-bottom: 10px; }
  .error-box {
    background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.2);
    border-radius: 10px; padding: 16px 18px; color: var(--red); font-size: 13px; line-height: 1.8;
  }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); z-index: 200;
    align-items: center; justify-content: center; backdrop-filter: blur(3px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg2); border: 1px solid var(--border2);
    border-radius: 14px; width: 660px; max-width: 95vw; max-height: 85vh;
    overflow-y: auto; padding: 22px;
  }
  .modal-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 18px; }
  .modal-title { font-size: 17px; font-weight: 700; }
  .modal-sub { font-size: 12px; color: var(--text2); margin-top: 3px; }
  .close-btn { background: none; border: none; color: var(--text3); font-size: 20px; cursor: pointer; }
  .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-bottom: 18px; }
  .mm { background: var(--bg3); border-radius: 8px; padding: 11px; }
  .mm-label { font-size: 11px; color: var(--text3); margin-bottom: 3px; }
  .mm-val { font-size: 17px; font-weight: 700; }
  .crit-list { display: flex; flex-direction: column; gap: 7px; }
  .crit-row { display: flex; align-items: center; gap: 9px; padding: 9px 11px; border-radius: 8px; }
  .crit-row.pass { background: rgba(52,211,153,0.08); border: 1px solid rgba(52,211,153,0.2); }
  .crit-row.fail { background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.2); }
  .crit-label { flex: 1; font-size: 13px; }
  .crit-detail { font-size: 12px; color: var(--text2); }

  @keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .fade { animation: fadeIn 0.25s ease forwards; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">週線<span>選股</span></div>
    <div class="hbadge">TWSE / OTC</div>
    <div class="spacer"></div>
    <span class="update-time" id="update-time">載入中...</span>
    <button class="refresh-btn" onclick="loadData()">↻ 重新載入</button>
  </header>

  <div class="main">
    <div class="sidebar">

      <div>
        <div class="sec-label">篩選條件</div>
        <div class="card">
          <div class="card-head"><span>📈</span><span class="card-title">突破後修正</span><span class="pill pill-g">啟用</span></div>
          <div class="param">
            <div class="prow"><span class="plabel">修正週數上限</span><span class="pval" id="v-cw">4</span></div>
            <input type="range" min="2" max="8" value="4" oninput="document.getElementById('v-cw').textContent=this.value" id="r-cw">
          </div>
          <div class="param">
            <div class="prow"><span class="plabel">最大修正幅度</span><span class="pval" id="v-cp">10</span>%</div>
            <input type="range" min="3" max="25" value="10" oninput="document.getElementById('v-cp').textContent=this.value" id="r-cp">
          </div>
        </div>
      </div>

      <div>
        <div class="sec-label">最低評分</div>
        <div class="card">
          <div class="param">
            <div class="prow"><span class="plabel">評分門檻</span><span class="pval" id="v-sc">60</span></div>
            <input type="range" min="0" max="100" value="60" oninput="document.getElementById('v-sc').textContent=this.value" id="r-sc">
          </div>
        </div>
      </div>

      <div>
        <div class="sec-label">市場</div>
        <div class="filter-group">
          <button class="fchip active" id="chip-all" onclick="setMarket('all')">全部</button>
          <button class="fchip" id="chip-TWSE" onclick="setMarket('TWSE')">上市</button>
          <button class="fchip" id="chip-TPEx" onclick="setMarket('TPEx')">上櫃</button>
        </div>
      </div>

      <div>
        <div class="sec-label">顯示</div>
        <div class="filter-group">
          <button class="fchip active" id="chip-pass-all" onclick="setPassFilter('all')">全部結果</button>
          <button class="fchip" id="chip-pass-ok" onclick="setPassFilter('pass')">只看通過</button>
        </div>
      </div>

      <button class="apply-btn" onclick="applyFilter()">套用篩選</button>

      <div style="font-size:11px;color:var(--text3);line-height:1.8;padding:0 2px">
        資料由 <code style="color:var(--accent)">screener.py</code> 每日執行後產生<br>
        存於 <code style="color:var(--accent)">data/results.json</code>
      </div>
    </div>

    <div class="content" id="content">
      <div class="loading-state">
        <div class="loading-icon">⚙</div>
        <div>載入選股資料中...</div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-body"></div>
</div>

<script>
let allData = [];
let filtered = [];
let sortKey = 'score';
let sortDir = -1;
let marketFilter = 'all';
let passFilter = 'all';

function setMarket(v) {
  marketFilter = v;
  ['all','TWSE','TPEx'].forEach(k => document.getElementById('chip-'+k)?.classList.toggle('active', k===v));
}
function setPassFilter(v) {
  passFilter = v;
  ['all','pass'].forEach(k => document.getElementById('chip-pass-'+k)?.classList.toggle('active', k===v));
}

async function loadData() {
  document.getElementById('update-time').textContent = '載入中...';
  try {
    const r = await fetch('data/results.json?t=' + Date.now());
    if (!r.ok) throw new Error('找不到 data/results.json，請先執行 screener.py');
    const json = await r.json();
    allData = json.stocks || [];
    document.getElementById('update-time').textContent = '更新：' + (json.updatedAt || '—');
    applyFilter(json);
  } catch(e) {
    document.getElementById('content').innerHTML = `
      <div class="error-box">
        ⚠️ ${e.message}<br><br>
        請在終端機執行：<br>
        <code style="color:var(--amber)">python screener.py</code><br><br>
        執行完成後重新整理頁面即可看到結果。
      </div>
    `;
    document.getElementById('update-time').textContent = '尚無資料';
  }
}

function applyFilter(meta) {
  const maxCorr = +document.getElementById('r-cp').value;
  const maxWeeks = +document.getElementById('r-cw').value;
  const minScore = +document.getElementById('r-sc').value;
  const search = document.getElementById('search-input')?.value?.toLowerCase() || '';

  filtered = allData.filter(s => {
    if (marketFilter !== 'all' && s.market !== marketFilter) return false;
    if (passFilter === 'pass' && !s.corePass) return false;
    if (s.corrPct > maxCorr) return false;
    if (s.barsSincePeak > maxWeeks + 2) return false;
    if (s.score < minScore) return false;
    if (search && !s.code.includes(search) && !s.name.includes(search) && !(s.industry||'').includes(search)) return false;
    return true;
  });

  sortFiltered();
  renderContent(meta);
}

function sortFiltered() {
  filtered.sort((a, b) => {
    let av = a[sortKey] ?? 0, bv = b[sortKey] ?? 0;
    if (typeof av === 'boolean') av = av ? 1 : 0;
    if (typeof bv === 'boolean') bv = bv ? 1 : 0;
    return (bv - av) * sortDir;
  });
}

function setSortKey(k) {
  if (sortKey === k) sortDir *= -1; else { sortKey = k; sortDir = -1; }
  sortFiltered();
  renderContent();
}

function scoreColor(s) {
  if (s >= 80) return '#34d399';
  if (s >= 55) return '#fbbf24';
  return '#f87171';
}

function renderContent(meta) {
  const passing = filtered.filter(r => r.corePass).length;
  const total = allData.length;

  const metricsHtml = `
    <div class="metrics-row fade">
      <div class="metric"><div class="metric-label">符合條件</div><div class="metric-val" style="color:var(--green)">${passing}</div><div class="metric-sub">篩選後</div></div>
      <div class="metric"><div class="metric-label">顯示中</div><div class="metric-val">${filtered.length}</div><div class="metric-sub">共掃描 ${total} 檔</div></div>
      <div class="metric"><div class="metric-label">平均修正</div><div class="metric-val">${filtered.length ? (filtered.reduce((a,r)=>a+r.corrPct,0)/filtered.length).toFixed(1) : '—'}%</div><div class="metric-sub">篩選結果</div></div>
      <div class="metric"><div class="metric-label">平均評分</div><div class="metric-val">${filtered.length ? Math.round(filtered.reduce((a,r)=>a+r.score,0)/filtered.length) : '—'}</div><div class="metric-sub">滿分 100</div></div>
    </div>
  `;

  const rows = filtered.map(r => {
    const chks = ['breakout','correction','maAlign','priceAboveMA','maTrend','volBreak','volShrink'];
    const chkHtml = chks.map(k => `<span class="chk ${r.checks[k]?'chk-ok':'chk-no'}" title="${k}"></span>`).join('');
    const sc = scoreColor(r.score);
    const dim = r.corePass ? '' : 'opacity:0.45;';
    return `
      <tr style="${dim}">
        <td><div class="sc">${r.code}<span class="mkt-tag">${r.market}</span></div><div class="sn">${r.name}</div></td>
        <td><span class="ind-tag">${r.industry||'—'}</span></td>
        <td style="font-weight:700">$${r.price}</td>
        <td style="color:${r.corrPct<=8?'var(--green)':'var(--amber)'}">-${r.corrPct}%</td>
        <td>${r.barsSincePeak}週</td>
        <td style="color:${r.checks?.volBreak?'var(--green)':'var(--text3)'}">${r.volRatio}x</td>
        <td><div class="bar-checks">${chkHtml}</div></td>
        <td>
          <div class="score-cell">
            <div class="score-track"><div class="score-fill" style="width:${r.score}%;background:${sc}"></div></div>
            <span class="score-num" style="color:${sc}">${r.score}</span>
          </div>
        </td>
        <td><button class="detail-btn" onclick='showDetail(${JSON.stringify(r).replace(/\'/g,"\\'")})'> 詳情</button></td>
      </tr>
    `;
  }).join('');

  const emptyHtml = `<div class="empty-state"><div class="empty-icon">🔍</div><div style="font-size:14px;color:var(--text2)">沒有符合條件的股票<br><small>調整篩選條件後再試</small></div></div>`;

  document.getElementById('content').innerHTML = metricsHtml + `
    <div class="toolbar fade">
      <input type="text" class="search-box" id="search-input" placeholder="搜尋代號 / 名稱 / 產業..." oninput="applyFilter()">
      <button class="sort-btn ${sortKey==='score'?'active':''}" onclick="setSortKey('score')">評分</button>
      <button class="sort-btn ${sortKey==='corrPct'?'active':''}" onclick="setSortKey('corrPct')">修正幅度</button>
      <button class="sort-btn ${sortKey==='volRatio'?'active':''}" onclick="setSortKey('volRatio')">量比</button>
    </div>
    <div style="overflow-x:auto" class="fade">
      ${filtered.length ? `
        <table>
          <thead><tr>
            <th>代號 / 名稱</th><th>產業</th><th>股價</th>
            <th>修正幅度</th><th>突破後週數</th><th>量比</th>
            <th style="min-width:80px">條件</th><th style="min-width:100px">評分</th><th></th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      ` : emptyHtml}
    </div>
    <div style="margin-top:8px;font-size:11px;color:var(--text3)">
      條件欄位依序：突破新高 / 修正合格 / 均線多頭 / 站上長均 / 均線向上 / 突破放量 / 修正縮量
    </div>
  `;
}

function showDetail(r) {
  const rows = [
    { key:'breakout', label:'突破前期高點', detail: r.checks.breakout ? `新高 $${r.peakVal}` : '未達新高' },
    { key:'correction', label:`修正 ${r.barsSincePeak} 週 / ${r.corrPct}%`, detail: r.checks.correction ? '✓ 在設定範圍內' : '✗ 超出範圍' },
    { key:'maAlign', label:'週線均線多頭排列', detail: r.maShort && r.maLong ? `MA短 ${r.maShort} > MA長 ${r.maLong}` : '—' },
    { key:'priceAboveMA', label:'股價站上長均線', detail: r.checks.priceAboveMA ? '✓' : '✗' },
    { key:'maTrend', label:'長均線向上斜率', detail: r.checks.maTrend ? '✓ 向上' : '✗ 偏平或向下' },
    { key:'volBreak', label:`突破量比 ${r.volRatio}x`, detail: r.checks.volBreak ? '✓ 放量突破' : '✗ 量能不足' },
    { key:'volShrink', label:'修正期縮量', detail: r.checks.volShrink ? '✓ 縮量整理' : '✗' },
  ];

  const canvasId = 'c' + Date.now();
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-header">
      <div>
        <div class="modal-title">${r.code} ${r.name} <span style="font-size:13px;color:var(--text2)">${r.market}</span></div>
        <div class="modal-sub">${r.industry||''} ｜ 評分 ${r.score}/100</div>
      </div>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>
    <div class="modal-grid">
      <div class="mm"><div class="mm-label">當前股價</div><div class="mm-val">$${r.price}</div></div>
      <div class="mm"><div class="mm-label">突破後修正</div><div class="mm-val" style="color:var(--amber)">-${r.corrPct}%</div></div>
      <div class="mm"><div class="mm-label">距高點週數</div><div class="mm-val">${r.barsSincePeak} 週</div></div>
      <div class="mm"><div class="mm-label">突破量比</div><div class="mm-val" style="color:${r.checks?.volBreak?'var(--green)':'var(--red)'}">${r.volRatio}x</div></div>
    </div>
    <div style="margin-bottom:14px">
      <div style="font-size:11px;color:var(--text3);margin-bottom:7px">近 12 週收盤走勢</div>
      <div style="position:relative;height:90px;background:var(--bg3);border-radius:8px;overflow:hidden">
        <canvas id="${canvasId}" style="width:100%;height:90px"></canvas>
      </div>
    </div>
    <div style="font-size:11px;color:var(--text3);margin-bottom:8px">條件達成明細</div>
    <div class="crit-list">
      ${rows.map(c=>`
        <div class="crit-row ${r.checks[c.key]?'pass':'fail'}">
          <span>${r.checks[c.key]?'✅':'❌'}</span>
          <span class="crit-label">${c.label}</span>
          <span class="crit-detail">${c.detail}</span>
        </div>`).join('')}
    </div>
  `;
  document.getElementById('modal').classList.add('open');

  setTimeout(() => {
    const cvs = document.getElementById(canvasId);
    if (!cvs) return;
    const W = cvs.parentElement.clientWidth, H = 90;
    cvs.width = W * devicePixelRatio; cvs.height = H * devicePixelRatio;
    cvs.style.width = W + 'px'; cvs.style.height = H + 'px';
    const ctx = cvs.getContext('2d');
    ctx.scale(devicePixelRatio, devicePixelRatio);
    const pts = (r.recentCloses || []).filter(v => v != null);
    if (pts.length < 2) return;
    const mn = Math.min(...pts), mx = Math.max(...pts), pad = 8;
    const sx = i => pad + i * (W - pad*2) / (pts.length-1);
    const sy = v => H - pad - (v - mn) / (mx - mn || 1) * (H - pad*2);
    const grad = ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0,'rgba(79,156,249,0.25)'); grad.addColorStop(1,'rgba(79,156,249,0.02)');
    ctx.beginPath(); ctx.moveTo(sx(0), sy(pts[0]));
    pts.forEach((v,i) => { if(i>0) ctx.lineTo(sx(i),sy(v)); });
    ctx.lineTo(sx(pts.length-1),H); ctx.lineTo(sx(0),H);
    ctx.closePath(); ctx.fillStyle = grad; ctx.fill();
    ctx.beginPath(); ctx.moveTo(sx(0),sy(pts[0]));
    pts.forEach((v,i) => { if(i>0) ctx.lineTo(sx(i),sy(v)); });
    ctx.strokeStyle='#4f9cf9'; ctx.lineWidth=2; ctx.lineJoin='round'; ctx.stroke();
  }, 50);
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

loadData();
</script>
</body>
</html>
